name: Build

on:
  push:
    branches: ['main', 'dev']
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Cache Rust Builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install dependencies
        run: pnpm i
      - name: Prepare aria2c sidecar
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = 'https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip'
          Invoke-WebRequest -Uri $url -OutFile aria2.zip
          Expand-Archive -Path aria2.zip -DestinationPath aria2_tmp -Force
          $exe = Get-ChildItem -Path aria2_tmp -Recurse -Filter aria2c.exe | Select-Object -First 1
          Copy-Item $exe.FullName 'src-tauri/binaries/aria2c-x86_64-pc-windows-msvc.exe'
      - name: Type check
        run: pnpm run typeCheck
      - name: Clean stale bundles
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/release/bundle) {
            Remove-Item -Recurse -Force src-tauri/target/release/bundle
          }
      - name: Build
        run: pnpm tauri build
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: x-spider-installer
          path: src-tauri/target/release/bundle/nsis/*
      - name: Release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" ./src-tauri/target/release/bundle/nsis/* \
            --title "$TAG" \
            --notes "v1.7.0 大版本更新：1) 游标式增量下载——记录每位博主上次抓取到的最新推文 ID，增量精确续传不再依赖日期猜测；2) 主动限流预算——按账号+接口解析 X-Rate-Limit 响应头记账，预算耗尽自动切换有余量的账号或等待重置，减少 429 撞墙；3) 失败推文队列——爬虫任务中单帖失败不再中断任务，进入持久化队列可在下载管理中重试/清空；4) 列表/关注导入——输入 X 列表 ID 或账号，一键把列表成员/关注对象批量加入博主管理；5) 仓库清理与若干修复。" \
            --latest
