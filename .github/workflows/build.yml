name: Build

on:
  push:
    branches: ['main', 'dev']
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Cache Rust Builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install dependencies
        run: pnpm i
      - name: Prepare aria2c sidecar
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = 'https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip'
          Invoke-WebRequest -Uri $url -OutFile aria2.zip
          Expand-Archive -Path aria2.zip -DestinationPath aria2_tmp -Force
          $exe = Get-ChildItem -Path aria2_tmp -Recurse -Filter aria2c.exe | Select-Object -First 1
          Copy-Item $exe.FullName 'src-tauri/binaries/aria2c-x86_64-pc-windows-msvc.exe'
      - name: Type check
        run: pnpm run typeCheck
      - name: Clean stale bundles
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/release/bundle) {
            Remove-Item -Recurse -Force src-tauri/target/release/bundle
          }
      - name: Build
        run: pnpm tauri build
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: x-spider-installer
          path: src-tauri/target/release/bundle/nsis/*
      - name: Release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" ./src-tauri/target/release/bundle/nsis/* \
            --title "$TAG" \
            --notes "自动构建版本。本次更新：修复下载管理缩略图悬停抖动（消除列表行反复重挂载与无变化时的轮询刷新）；博主管理增量下载默认时间改为取上次下载时间与本地最新文件日期中较新者，不再固定为旧文件日期；侧边栏下载管理与博主管理位置互换。" \
            --latest
