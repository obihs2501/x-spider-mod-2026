name: Build

on:
  push:
    branches: ['main', 'dev']
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup PNPM
        uses: pnpm/action-setup@v3
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Cache Rust Builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install dependencies
        run: pnpm i
      - name: Prepare aria2c sidecar
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = 'https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip'
          Invoke-WebRequest -Uri $url -OutFile aria2.zip
          Expand-Archive -Path aria2.zip -DestinationPath aria2_tmp -Force
          $exe = Get-ChildItem -Path aria2_tmp -Recurse -Filter aria2c.exe | Select-Object -First 1
          Copy-Item $exe.FullName 'src-tauri/binaries/aria2c-x86_64-pc-windows-msvc.exe'
      - name: Type check
        run: pnpm run typeCheck
      - name: Clean stale bundles
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/release/bundle) {
            Remove-Item -Recurse -Force src-tauri/target/release/bundle
          }
      - name: Build
        run: pnpm tauri build
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: x-spider-installer
          path: src-tauri/target/release/bundle/nsis/*
      - name: Release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" ./src-tauri/target/release/bundle/nsis/* \
            --title "$TAG" \
            --notes "自动构建版本。本次更新：下载管理中缩略图/博主名优先打开本地文件与文件夹（本地不存在才跳转 X 网页）；回退主页帖子预览的本地媒体改动。另含 v1.6.0：博主改名沿用旧文件夹、日志级别与自动清理、画廊手动增量刷新、账号轮换不刷新左上角。" \
            --latest
